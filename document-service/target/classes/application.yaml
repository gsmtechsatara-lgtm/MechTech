spring:
  application:
    name: document-service
  datasource:
    url: jdbc:mysql://localhost:3306/document-service
    username: AcmeInfi
    password: ProteasLankans
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false

  server:
    port: 8081

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

document-service:
  storage:
    base-dir: uploads
    physical-delete-enabled: false
    # If you want a public URL, set this. Otherwise fileUrl will be stored as the relative upload path.
    public-base-url: ""

